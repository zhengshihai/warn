tencent.sms.sdk-app-id=your-sdk-app-id
tencent.sms.sign-name=your-sign-name
tencent.sms.template-id=your-template-id
tencent.sms.region=ap-guangzhou

# 时区配置
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss