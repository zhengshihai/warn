# RocketMQ配置
rocketmq.name-server=127.0.0.1:9876

# 报警业务配置
rocketmq.alarm.producer.group=alarm-producer-group
rocketmq.alarm.consumer.group=alarm-consumer-group

# 视频业务配置
rocketmq.video.producer.group=video-producer-group
rocketmq.video.consumer.group=video-consumer-group

# 通用配置
rocketmq.producer.send-message-timeout=10000
rocketmq.producer.retry-times-when-send-failed=3
rocketmq.producer.retry-times-when-send-async-failed=3
rocketmq.producer.max-message-size=4194304

# 腾讯云短信配置
tencent.sms.secret-id=your-secret-id
