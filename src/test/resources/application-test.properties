# \u6D4B\u8BD5\u73AF\u5883\u914D\u7F6E\u6587\u4EF6 - Spring MVC + Tomcat \u9879\u76EE

# \u6570\u636E\u5E93\u914D\u7F6E
jdbc.driverClassName=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3306/warn_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
jdbc.username=root
jdbc.password=123456

# MyBatis\u914D\u7F6E
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Redis\u914D\u7F6E - \u4E0E\u9879\u76EE\u4E2D\u7684redis.properties\u4FDD\u6301\u4E00\u81F4
redis.host=127.0.0.1
redis.port=6379
redis.password=
redis.timeout=2000
redis.pool.max-active=8
redis.pool.max-wait=-1
redis.pool.max-idle=8
redis.pool.min-idle=0

# \u65E5\u5FD7\u914D\u7F6E
log4j.rootLogger=DEBUG, stdout, file
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

log4j.appender.file=org.apache.log4j.RollingFileAppender
log4j.appender.file.File=logs/test.log
log4j.appender.file.MaxFileSize=10MB
log4j.appender.file.MaxBackupIndex=5
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# \u6D4B\u8BD5\u7279\u5B9A\u914D\u7F6E
test.mode=true
test.redis.enabled=true

# \u62A5\u8B66\u7CFB\u7EDF\u6D4B\u8BD5\u914D\u7F6E
alarm.test.mode=true
alarm.rate.limit.test=100
alarm.websocket.test.enabled=false

# \u77ED\u4FE1\u670D\u52A1\u6D4B\u8BD5\u914D\u7F6E
sms.test.mode=true
sms.test.phone=13800138000

# \u5730\u56FEAPI\u6D4B\u8BD5\u914D\u7F6E
map.api.test.key=c34c1fdbcbe4d043906c95993710fbcc
map.api.test.secret=test_api_secret

# \u6587\u4EF6\u4E0A\u4F20\u914D\u7F6E
file.upload.path=/tmp/test/uploads/
file.upload.maxSize=10485760

# \u90AE\u4EF6\u914D\u7F6E
mail.host=smtp.qq.com
mail.port=587
mail.username=test@qq.com
mail.password=test_password
mail.properties.mail.smtp.auth=true
mail.properties.mail.smtp.starttls.enable=true 